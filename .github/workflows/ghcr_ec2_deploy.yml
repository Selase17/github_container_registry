name: GHCR Workflow

on:
  - push

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: wine-shop
  IMAGE_OWNER: selase17         # lowercase GHCR namespace
  CONTAINER_NAME: wine-shop     # name used for `docker run --name`
  HOST_PORT: 80                 # port exposed on the EC2 instance
  CONTAINER_PORT: 80            # port your app listens on inside the container

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  docker_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # Pushing to GitHub Container Registry (GHCR)
      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish code to GHCR
        run: |
          docker build -t ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: docker_build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}       # public IP or DNS of the EC2 instance
          username: ${{ secrets.EC2_USER }}       # e.g. ubuntu, ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}    # contents of your .pem private key
          port:     22
          envs: CONTAINER_REGISTRY,IMAGE_NAME,IMAGE_OWNER,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT
          script: |
            set -euo pipefail

            # Log in to GHCR from the EC2 box so it can pull the image.
            # GHCR_PAT must be a PAT (classic) with `read:packages` scope,
            # OR make the package public and this step can be removed.
            echo "${{ secrets.GHCR_PAT }}" | docker login $CONTAINER_REGISTRY \
              -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            IMAGE="$CONTAINER_REGISTRY/$IMAGE_OWNER/$IMAGE_NAME:latest"

            docker pull  "$IMAGE"
            docker stop  "$CONTAINER_NAME" 2>/dev/null || true
            docker rm    "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              "$IMAGE"

            # Free disk from old images
            docker image prune -f